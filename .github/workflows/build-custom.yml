name: Build DDG Browser with Proxy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Позволяет запускать сборку вручную через кнопку

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Обязательно выкачиваем все сабмодули

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assembling App (Debug)
        run: ./gradlew app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duckduckgo-proxy-debug-apk
          path: app/build/outputs/apk/internal/debug/*.apk
