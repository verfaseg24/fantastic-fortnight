name: Build DDG Browser with Proxy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Позволяет запускать сборку вручную через кнопку

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch missing submodules (Fallback for ZIP uploads)
        run: |
          if [ -z "$(ls -A httpsupgrade/httpsupgrade-impl/src/main/cpp/bloom_cpp 2>/dev/null)" ] || [ ! -d "httpsupgrade/httpsupgrade-impl/src/main/cpp/bloom_cpp" ]; then
            rm -rf httpsupgrade/httpsupgrade-impl/src/main/cpp/bloom_cpp
            git clone https://github.com/duckduckgo/bloom_cpp.git httpsupgrade/httpsupgrade-impl/src/main/cpp/bloom_cpp
          fi
          if [ -z "$(ls -A submodules/privacy-grade 2>/dev/null)" ] || [ ! -d "submodules/privacy-grade" ]; then
            rm -rf submodules/privacy-grade
            git clone https://github.com/duckduckgo/privacy-grade.git submodules/privacy-grade
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18.3'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assembling App (Debug)
        run: ./gradlew app:assembleDebug --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duckduckgo-proxy-debug-apk
          path: app/build/outputs/apk/internal/debug/*.apk
